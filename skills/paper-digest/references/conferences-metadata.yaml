# Conference static metadata for Phase 4 render enrichment.
#
# Sources:
#   - CCF 2022 推荐目录（第六版）
#   - CORE 2023 Portal
#   - Google Scholar Metrics 2025
#   - Conference 官网（接收率 / Best Paper）
#
# Fields are direction-agnostic conference attributes. Direction-specific
# overlays (e.g. how strongly a given direction cares about ISMM vs. ICFP)
# live in `references/profiles/<name>.yaml` under `direction_match:`.
#
# tier:
#   S = top venues (core target across many directions)
#   A = strong / high-quality
#   B = specialized
#
# Add a new conference by giving at least: tier, ccf, core, h5, full_name.
# Per-year sub-entry is filled after the conference is announced or held.
# Use `status: skipped` / `stopped` / `postponed` to suppress an off-year
# from rendering as a generic placeholder.

