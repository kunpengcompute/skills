repos:
  - repo: local
    hooks:
      - id: skill-scanner-local
        name: skill-scanner
        entry: skill-scanner scan-all ./ --recursive --check-overlap --use-behavioral --fail-on-severity=critical
        language: python
        stages: [manual]
        pass_filenames: false
  - repo: https://gitcode.com/gh_mirrors/sk/skill-scanner
    rev: 2.0.11
    hooks:
      - id: skill-scanner
        args: ['--severity=critical']
        stages: [pre-commit]
        verbose: true