# 统一配置文件（远程主机地址、端口、用户名、密码、预定义任务等）

[remote]
host=<remote_host>
user=<username>
password=<password>
port=<ssh_port>

[sync]
source_path=.
target_path=/home/omni/
exclude_file=exclude.txt
delete_mode=false
dry_run=false
verbose=false

[ssh]
verbose=false

[exec]
verbose=false
keep_alive=false
# command是默认命令，可以改的
command=ls -la

task_sysinfo=echo "=== 系统信息 ===" && hostname && whoami && date && uptime
task_diskinfo=echo "=== 磁盘使用情况 ===" && df -h
task_meminfo=echo "=== 内存使用情况 ===" && free -h
task_procinfo=echo "=== 进程信息 ===" && ps aux | head -10
task_netinfo=echo "=== 网络信息 ===" && netstat -tuln | head -10
task_logcheck=echo "=== 系统日志 ===" && tail -20 /var/log/syslog 2>/dev/null || tail -20 /var/log/messages 2>/dev/null || echo "无法访问系统日志"

# 复杂多行命令示例 - 使用分号和换行
task_fullreport=echo "=== 完整系统报告 ==="; \
echo "时间: \$(date)"; \
echo "主机: \$(hostname)"; \
echo "用户: \$(whoami)"; \
echo ""; \
echo "=== 系统信息 ==="; \
uname -a; \
echo ""; \
echo "=== 内存信息 ==="; \
free -h; \
echo ""; \
echo "=== 磁盘信息 ==="; \
df -h; \
echo ""; \
echo "=== 进程TOP5 ==="; \
ps aux --sort=-%cpu | head -6

# 编译任务 - 编译OmniOperator和Gluten
task_compile=set -ex; \
start_time=\$(date +%s); \
export CMAKE_MODULE_PATH=; \
export OMNI_HOME=/home/omni/omni-operator; \
export LD_LIBRARY_PATH=/\$OMNI_HOME/lib:/usr/local/lib:/usr/local/lib64:\$LD_LIBRARY_PATH; \
export LIBRARY_PATH=\$LD_LIBRARY_PATH; \
export omni_spark_version=spark-3.5; \
export CPLUS_INCLUDE_PATH=/usr/local/include/orc:/usr/local/include:\$CPLUS_INCLUDE_PATH; \
export C_INCLUDE_PATH=\$CPLUS_INCLUDE_PATH; \
work_dir=/home/omni; \
JIT_HOME=\$work_dir/OmniOperator; \
GLUTEN_HOME=\$work_dir/Gluten; \
cd \$work_dir; \
rm \$OMNI_HOME/lib/libboostkit-omniop-* -rf; \
rm \$OMNI_HOME/lib/include -rf; \
rm \$OMNI_HOME/lib/boostkit-omniop-* -rf; \
cd \$JIT_HOME; \
bash build_scripts/build.sh release:java; \
cd \$JIT_HOME/bindings/java; \
mvn clean install -Ddep.os.arch=aarch64 -DskipTests; \
end_time=\$(date +%s); \
compile_time=\$((\$end_time - \$start_time)); \
echo "编译耗时: \$compile_time 秒"; 



# 单元测试任务 - 执行OmniOperator全量UT
task_ut=set -ex; \
export CMAKE_MODULE_PATH=; \
export OMNI_HOME=/home/omni/omni-operator; \
export LD_LIBRARY_PATH=/\$OMNI_HOME/lib:/usr/local/lib:/usr/local/lib64:\$LD_LIBRARY_PATH; \
export LIBRARY_PATH=\$LD_LIBRARY_PATH; \
export omni_spark_version=spark-3.5; \
export CPLUS_INCLUDE_PATH=/usr/local/include/orc:/usr/local/include:\$CPLUS_INCLUDE_PATH; \
export C_INCLUDE_PATH=\$CPLUS_INCLUDE_PATH; \
work_dir=/home/omni; \
JIT_HOME=\$work_dir/OmniOperator; \
GLUTEN_HOME=\$work_dir/Gluten; \
cd \$work_dir; \
./OmniOperator/build/core/test/omtest

